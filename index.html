<script>
// ── Inline PWA manifest (works from file:// and http://) ──────────────
(function() {
  const icons = [{
    src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%232E7D5E'/><text y='130' x='50%' text-anchor='middle' font-size='110'>🍽️</text></svg>`),
    sizes: "192x192", type: "image/svg+xml", purpose: "any maskable"
  },{
    src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%232E7D5E'/><text y='360' x='50%' text-anchor='middle' font-size='300'>🍽️</text></svg>`),
    sizes: "512x512", type: "image/svg+xml", purpose: "any maskable"
  }];
  const manifest = {
    name: "FamilyMeal — Planificador de Comidas",
    short_name: "FamilyMeal",
    description: "Planificador semanal de comidas para tu familia",
    start_url: "./",
    display: "standalone",
    background_color: "#FDFAF6",
    theme_color: "#2E7D5E",
    orientation: "portrait-primary",
    lang: "es",
    icons
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const url = URL.createObjectURL(blob);
  document.getElementById('manifest-placeholder').href = url;

  // ── Service Worker for offline ──────────────────────────────────────
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'familymeal-v1';
const URLS = [
  'https://unpkg.com/react@18/umd/react.development.js',
  'https://unpkg.com/react-dom@18/umd/react-dom.development.js',
  'https://unpkg.com/@babel/standalone/babel.min.js'
];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS).catch(()=>{})));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(()=>new Response('Offline', {status:503}))));
});`;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
})();
</script>

// ─── HELPERS ────────────────────────────────────────────────────────────
function generateShoppingList(week, inventory) {
  const totals = {};
  Object.values(week).forEach(day => {
    Object.values(day).forEach(recipe => {
      if (!recipe) return;
      recipe.ingredients.forEach(ing => {
        const key = ing.name.toLowerCase();
        if (!totals[key]) totals[key] = { name: ing.name, qty: 0, unit: ing.unit, cat: guessCat(ing.name) };
        const n = parseFloat(ing.qty);
        if (!isNaN(n)) totals[key].qty += n;
      });
    });
  });
  const invMap = {};
  inventory.forEach(i => { invMap[i.name.toLowerCase()] = parseFloat(i.qty) || 0; });
  const items = Object.values(totals).map(item => {
    const have = invMap[item.name.toLowerCase()] || 0;
    const need = Math.max(0, item.qty - have);
    return { ...item, need, have };
  }).filter(i => i.need > 0);
  const bycat = {};
  items.forEach(i => {
    if (!bycat[i.cat]) bycat[i.cat] = [];
    bycat[i.cat].push(i);
  });
  return bycat;
}

function guessCat(name) {
  const n = name.toLowerCase();
  if (/(tomate|cebolla|ajo|zanahoria|espinaca|brócoli|zucchini|morrón|papa|lechuga|apio|verdeo|chaucha|arveja|banana|manzana|limón|frutilla|fruta)/.test(n)) return "Verdulería";
  if (/(carne|pollo|milanesa|chorizo|cerdo|res|ternera|jamón)/.test(n)) return "Carnicería";
  if (/(leche|yogur|queso|ricota|crema|manteca|huevo)/.test(n)) return "Lácteos";
  if (/(pan|harina|avena|granola|galleta)/.test(n)) return "Panadería";
  return "Almacén";
}

function getDiffColor(d) {
  if (d === "fácil") return "badge-green";
  if (d === "media") return "badge-amber";
  return "badge-rose";
}

// ── Local recipe text parser — zero API, zero config ──────────────────────
function parseRecipeText(raw) {
  const lines = raw.split(/\n/).map(l => l.trim()).filter(Boolean);
  const text = raw;

  // ── Name: first non-empty line, or line after "nombre:" / "receta:" ──
  let name = '';
  const nameMatch = text.match(/(?:nombre|receta|título)[:\s]+([^\n]+)/i);
  if (nameMatch) name = nameMatch[1].trim();
  else name = lines[0] || 'Receta importada';

  // ── Category guess ───────────────────────────────────────────────────
  const lower = text.toLowerCase();
  let category = 'cena';
  if (/desayuno|tostada|avena|granola|jugo|mate|café|panqueque|medialunas/.test(lower)) category = 'desayuno';
  else if (/colación|colacion|vianda|recreo|escuela|merienda escolar/.test(lower)) category = 'colacion';
  else if (/almuerzo|mediodía|mediodia/.test(lower)) category = 'almuerzo';
  else if (/merienda|té |te |infusión|galletitas|bizcochuelo|torta|budín/.test(lower)) category = 'merienda';

  // ── Emoji guess ──────────────────────────────────────────────────────
  const emojiMap = [
    [/pollo|chicken/,'🍗'],[/pasta|fideos|spaghetti|tallarines/,'🍝'],
    [/arroz/,'🍚'],[/sopa|caldo/,'🍜'],[/ensalada/,'🥗'],
    [/tarta|quiche/,'🥧'],[/pizza/,'🍕'],[/hamburguesa/,'🍔'],
    [/milanesa|milanga/,'🍖'],[/pescado|atún|salmon/,'🐟'],
    [/huevo|tortilla/,'🍳'],[/panqueque|crepe/,'🥞'],
    [/empanada/,'🥟'],[/sandwich|sándwich/,'🥪'],[/avena/,'🥣'],
    [/fruta|frutilla|banana|manzana/,'🍓'],[/yogur/,'🥛'],
    [/torta|bizcochuelo|cake/,'🎂'],[/galleta|cookie/,'🍪'],
    [/carne|bife|churras/,'🥩'],[/cerdo|lechon/,'🐷'],
    [/verdura|veggie|vegetal/,'🥦'],[/legumbre|lenteja|garbanzo|poroto/,'🫘'],
  ];
  let emoji = '🍽️';
  for (const [re, em] of emojiMap) { if (re.test(lower)) { emoji = em; break; } }

  // ── Time ────────────────────────────────────────────────────────────
  let time = 30;
  const timeMatch = text.match(/(\d+)\s*(?:minutos?|mins?|min\.)/i);
  if (timeMatch) time = parseInt(timeMatch[1]);
  else {
    const hrMatch = text.match(/(\d+)\s*(?:horas?|hs?\.?)/i);
    if (hrMatch) time = parseInt(hrMatch[1]) * 60;
  }

  // ── Difficulty ──────────────────────────────────────────────────────
  let difficulty = 'fácil';
  if (/difícil|elaborad|complicad|avanzad|complej/i.test(text)) difficulty = 'elaborada';
  else if (/medi[ao]|intermedi/i.test(text)) difficulty = 'media';

  // ── Source ──────────────────────────────────────────────────────────
  let source = 'Importada';
  const srcMatch = text.match(/(?:fuente|source|de:|por:|autor|blog|canal)[:\s]+([^\n]{3,40})/i);
  if (srcMatch) source = srcMatch[1].trim();
  else if (/paulina/i.test(text)) source = 'Paulina Cocina';
  else if (/instagram/i.test(text)) source = 'Instagram';
  else if (/youtube/i.test(text)) source = 'YouTube';

  // ── Tags ────────────────────────────────────────────────────────────
  const tags = [];
  if (/vegetarian[ao]|veggie|sin carne/i.test(text)) tags.push('vegetariano');
  if (/sin gluten|gluten.free|celiac/i.test(text)) tags.push('sin gluten');
  if (/rápido|rapido|fácil|facil|quick/i.test(text)) tags.push('rápido');
  if (/horno/i.test(text)) tags.push('horno');
  if (/niño|niños|kids|infantil/i.test(text)) tags.push('niños');
  if (time <= 20) tags.push('rápido');

  // ── Ingredients ─────────────────────────────────────────────────────
  // Find ingredient section: look for "ingredientes", "necesitás", "materiales"
  const ingSection = text.match(/ingredientes?[:\s]*([\s\S]*?)(?=preparación|modo de|pasos|procedimiento|instrucciones|elaboración|$)/i);
  const ingRaw = ingSection ? ingSection[1] : text;
  
  // Unit patterns
  const unitRe = /\b(kg|g|gr|gramos?|mg|l|lt|litros?|ml|tazas?|cdas?\.?|cucharadas?|cditas?\.?|cucharitas?|unidades?|un\.|u\.|potes?|atados?|manojos?|cabezas?|dientes?|rebanadas?|rodajas?|filetes?|piezas?|porciones?|latas?|sobres?|paquetes?|puñados?)\b/i;
  const ingLines = ingRaw.split(/\n/).map(l => l.trim()).filter(l =>
    l.length > 2 && l.length < 120 &&
    !(/^(?:ingredientes?|preparación|pasos?|modo|instrucciones?|procedimiento|elaboración|para servir|para decorar|para la masa|para el relleno)[:.]?$/i.test(l))
  );

  const ingredients = [];
  for (const line of ingLines) {
    // Skip obvious step lines
    if (/^\d+[.)\-]\s/.test(line) && line.length > 60) continue;
    if (/precalentar|mezclar|cocinar|hervir|hornear|agregar|poner|llevar|batir|cortar|picar|saltear/i.test(line) && !/\d/.test(line)) continue;

    // Try to extract qty + unit + name
    const m = line.match(/^[-•*·]?\s*([\d.,\/½¼¾]+)?\s*([\w.]+)?\s+(?:de\s+)?(.+)$/);
    // Pattern: "2 tazas de harina", "200g queso", "3 huevos", "1/2 cebolla"
    const fullMatch = line.match(/^[-•*·]?\s*([\d.,\/ ½¼¾]+)?\s*(` + '`' + `${unitRe.source}` + '`' + `)?\s*(?:de\s+)?([a-záéíóúüñA-ZÁÉÍÓÚÜÑ][\w\s,()]+)/);
    
    let qty = '', unit = '', name = '';
    if (fullMatch) {
      qty = (fullMatch[1] || '').trim().replace(',','.');
      unit = (fullMatch[2] || '').trim();
      name = (fullMatch[3] || '').trim();
    } else {
      // Simple: just take the whole line as name
      name = line.replace(/^[-•*·]\s*/, '').trim();
    }
    if (name && name.length > 1 && name.length < 80) {
      ingredients.push({ name, qty: qty || '1', unit: unit || 'unidad' });
    }
  }

  // ── Steps ────────────────────────────────────────────────────────────
  const stepSection = text.match(/(?:preparación|modo de preparar|pasos?|procedimiento|instrucciones?|elaboración)[:\s]*([\s\S]+)/i);
  const stepRaw = stepSection ? stepSection[1] : text;
  
  const steps = stepRaw
    .split(/\n/)
    .map(l => l.trim())
    .filter(l => l.length > 10)
    .map(l => l.replace(/^\d+[.)\-]\s*/, '').replace(/^[-•*·]\s*/, '').trim())
    .filter(l => l.length > 10 && l.length < 500)
    .filter(l => !/^(?:ingredientes?|preparación|pasos?)[:.]?$/i.test(l))
    .slice(0, 20);

  return {
    name: name.slice(0, 80),
    category,
    emoji,
    time,
    difficulty,
    source,
    tags: tags.join(', '),
    ingredients: ingredients.length ? ingredients : [{ name: '', qty: '1', unit: 'unidad' }],
    steps: steps.length ? steps : [''],
  };
}

            <div className="flex items-center gap-8 mb-4">
              <span style={{fontSize:28}}>{recipe.emoji}</span>
              <h3>{recipe.name}</h3>
            </div>
            <div className="flex gap-6 wrap">
              <span className={`badge ${CAT_COLORS[recipe.category] || 'badge-gray'}`}>{MEAL_LABELS[recipe.category]}</span>
              <span className={`badge ${getDiffColor(recipe.difficulty)}`}>{recipe.difficulty}</span>
              <span className="badge badge-gray">⏱ {recipe.time} min</span>
              <span className="badge badge-gray">📖 {recipe.source}</span>
            </div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="flex items-center gap-12 mb-16">
            <span className="label" style={{margin:0}}>Porciones:</span>
            <div className="tabs">
              {scaleOptions.map(s => (
                <button key={s} className={`tab ${scale === s ? 'active' : ''}`} onClick={() => setScale(s)}>
                  {Math.round(recipe.servings * s)} pers.
                </button>
              ))}
            </div>
          </div>
          <h4 className="font-semibold mb-8" style={{fontSize:14}}>🥕 Ingredientes</h4>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:20}}>
            {recipe.ingredients.map((ing, i) => {
              const scaledQty = typeof ing.qty === 'number' ? (ing.qty * scale).toFixed(ing.qty % 1 === 0 ? 0 : 1) : ing.qty;
              const isAvail = available[i];
              return (
                <div key={i} onClick={() => setAvailable(a => ({...a,[i]:!a[i]}))}
                  style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderRadius:8,background:isAvail?'var(--accent-bg)':'var(--bg2)',cursor:'pointer',border:`1px solid ${isAvail?'#B8DFC8':'var(--border)'}`,fontSize:13}}>
                  <span style={{color:isAvail?'var(--accent2)':'var(--text3)',fontSize:11}}>{isAvail?'✓':'○'}</span>
                  <span style={{flex:1,color:isAvail?'var(--accent2)':'var(--text)',textDecoration:isAvail?'line-through':'none'}}>{ing.name}</span>
                  <span style={{color:'var(--text3)',fontWeight:600,fontSize:12}}>{scaledQty} {ing.unit}</span>
                </div>
              );
            })}
          </div>
          <h4 className="font-semibold mb-8" style={{fontSize:14}}>📋 Preparación</h4>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {recipe.steps.map((step, i) => (
              <div key={i} style={{display:'flex',gap:10,padding:'10px 12px',background:'var(--bg2)',borderRadius:8}}>
                <span style={{minWidth:22,height:22,background:'var(--accent)',color:'white',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>{i+1}</span>
                <span style={{fontSize:13,lineHeight:1.5}}>{step}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cerrar</button>
        </div>
      </div>
    </div>
  );
}

function RecipePickerModal({ onSelect, onClose, recipes, currentMeal }) {
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState(currentMeal || "all");
  const filtered = recipes.filter(r => {
    const matchSearch = r.name.toLowerCase().includes(search.toLowerCase());
    const matchCat = catFilter === "all" || r.category === catFilter;
    return matchSearch && matchCat;
  });
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>Seleccionar receta</h3>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <input className="input mb-12" placeholder="Buscar receta..." value={search} onChange={e => setSearch(e.target.value)} autoFocus />
          <div className="tabs mb-12" style={{flexWrap:'wrap'}}>
            {["all",...MEALS].map(c => (
              <button key={c} className={`tab ${catFilter === c ? 'active' : ''}`} onClick={() => setCatFilter(c)}>
                {c === "all" ? "Todas" : MEAL_LABELS[c]}
              </button>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {filtered.map(r => (
              <div key={r.id} onClick={() => { onSelect(r); onClose(); }}
                style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:10,border:'1px solid var(--border)',cursor:'pointer',background:'var(--card)',transition:'all 0.1s'}}
                onMouseEnter={e => e.currentTarget.style.background='var(--bg2)'}
                onMouseLeave={e => e.currentTarget.style.background='var(--card)'}>
                <span style={{fontSize:24}}>{r.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{r.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>⏱ {r.time} min · {r.source}</div>
                </div>
                <span className={`badge ${CAT_COLORS[r.category] || 'badge-gray'}`}>{MEAL_LABELS[r.category]}</span>
              </div>
            ))}
            {filtered.length === 0 && <div className="empty-state" style={{padding:24}}><p>No se encontraron recetas</p></div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function AddRecipeModal({ onClose, onSave }) {
  const EMPTY_FORM = { name:'', category:'cena', emoji:'🍽️', time:30, difficulty:'fácil', source:'Propia', tags:'', ingredients:[{name:'',qty:'1',unit:'unidad'}], steps:[''] };
  const [form, setForm] = useState(EMPTY_FORM);
  const [tab, setTab] = useState('pegar');   // 'pegar' | 'manual'
  const [rawText, setRawText] = useState('');
  const [parseState, setParseState] = useState('idle'); // idle | done | error
  const [parseMsg, setParseMsg] = useState('');

  const upd = (k, v) => setForm(f => ({...f, [k]:v}));
  const addIng = () => setForm(f => ({...f, ingredients:[...f.ingredients,{name:'',qty:'1',unit:'unidad'}]}));
  const updIng = (i, k, v) => setForm(f => { const a=[...f.ingredients]; a[i]={...a[i],[k]:v}; return {...f,ingredients:a}; });
  const removeIng = i => setForm(f => ({...f, ingredients:f.ingredients.filter((_,idx)=>idx!==i)}));
  const addStep = () => setForm(f => ({...f, steps:[...f.steps,'']}));
  const updStep = (i, v) => setForm(f => { const a=[...f.steps]; a[i]=v; return {...f,steps:a}; });
  const removeStep = i => setForm(f => ({...f, steps:f.steps.filter((_,idx)=>idx!==i)}));

  const handleSave = () => {
    if (!form.name.trim()) return alert('Ingresá el nombre de la receta');
    const recipe = { ...form, id: Date.now(), servings: 4, favorite: false,
      tags: Array.isArray(form.tags) ? form.tags : form.tags.split(',').map(t=>t.trim()).filter(Boolean),
      ingredients: form.ingredients.filter(i => i.name && String(i.name).trim()),
      steps: form.steps.filter(s => s && String(s).trim()) };
    onSave(recipe);
    onClose();
  };

  const handleParse = () => {
    if (!rawText.trim()) { setParseMsg('Pegá el texto de la receta primero.'); setParseState('error'); return; }
    try {
      const parsed = parseRecipeText(rawText);
      setForm(parsed);
      setParseState('done');
      setParseMsg('¡Receta cargada! Revisá y corregí lo que necesites antes de guardar.');
      setTab('manual');
    } catch(e) {
      setParseState('error');
      setParseMsg('No se pudo leer el texto. Intentá con la pestaña Manual.');
    }
  };

  // Example template to show user the expected format
  const TEMPLATE = `Milanesas al horno con papas
Categoría: cena
Tiempo: 45 minutos
Dificultad: fácil
Fuente: Paulina Cocina

Ingredientes:
- 8 milanesas de ternera
- 4 papas grandes
- 2 huevos
- 1 taza de pan rallado
- 3 dientes de ajo
- 3 cdas de aceite de oliva
- Sal y pimienta a gusto

Preparación:
1. Precalentar el horno a 200°C.
2. Batir los huevos con sal, pimienta y ajo picado.
3. Pasar las milanesas por huevo y luego por pan rallado.
4. Cortar las papas en gajos y condimentar con aceite y sal.
5. Hornear todo 35-40 minutos dando vuelta a mitad de cocción.`;

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:720}}>
        <div className="modal-header">
          <h3>Agregar Receta</h3>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body" style={{paddingTop:12}}>
          <div className="tabs mb-16">
            <button className={`tab ${tab==='pegar'?'active':''}`} onClick={()=>setTab('pegar')}>
              📋 Pegar texto
            </button>
            <button className={`tab ${tab==='manual'?'active':''}`} onClick={()=>setTab('manual')}>
              ✏️ Manual
            </button>
          </div>

          {/* ── PEGAR TAB ── */}
          {tab === 'pegar' && (
            <div style={{display:'flex',flexDirection:'column',gap:14}}>

              {/* How-to banner */}
              <div style={{background:'var(--blue-bg)',border:'1px solid #B8D4F0',borderRadius:12,padding:'12px 16px'}}>
                <div style={{fontWeight:700,color:'var(--blue)',fontSize:13,marginBottom:6}}>¿Cómo usar esta función?</div>
                <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>
                  <strong>Desde cualquier web o app:</strong> copiá el texto de la receta (Ctrl+A → Ctrl+C) y pegalo abajo (Ctrl+V).<br/>
                  <strong>Desde una foto:</strong> usá Google Lens, la cámara de Google o el texto en vivo de tu celular para convertir la foto a texto, luego copiá y pegá.<br/>
                  <strong>Desde Instagram o YouTube:</strong> copiá la descripción del post o los comentarios con la receta.
                </div>
              </div>

              {/* Text area */}
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <label className="label" style={{margin:0}}>Pegá el texto de la receta</label>
                  <button className="btn btn-ghost btn-sm" style={{fontSize:11,color:'var(--text3)'}}
                    onClick={()=>setRawText(TEMPLATE)}>
                    Ver ejemplo de formato
                  </button>
                </div>
                <textarea
                  className="textarea"
                  style={{minHeight:220,fontSize:13,lineHeight:1.6,fontFamily:'monospace'}}
                  placeholder={"Pegá acá el texto de la receta...\n\nEjemplo:\nMilanesas al horno\nIngredientes:\n- 8 milanesas\n- 4 papas\nPreparación:\n1. Precalentar el horno...\n2. ..."}
                  value={rawText}
                  onChange={e=>{setRawText(e.target.value); setParseState('idle');}}
                />
              </div>

              {/* Parse result message */}
              {parseState === 'error' && (
                <div style={{background:'var(--rose-bg)',border:'1px solid #F0C0C8',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--rose)'}}>{parseMsg}</div>
              )}

              {/* Accepted formats info */}
              <div style={{background:'var(--bg2)',borderRadius:10,padding:'10px 14px',fontSize:12,color:'var(--text3)',lineHeight:1.7}}>
                <strong style={{color:'var(--text2)'}}>La app detecta automáticamente:</strong> nombre, ingredientes con cantidades, pasos, tiempo, categoría y dificultad.
                No necesita un formato exacto — funciona con texto libre copiado de cualquier fuente.
              </div>

              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button className="btn btn-secondary" onClick={()=>setTab('manual')}>✏️ Cargar manualmente</button>
                <button className="btn btn-primary" onClick={handleParse} disabled={!rawText.trim()}>
                  ✨ Procesar texto →
                </button>
              </div>
            </div>
          )}

          {/* ── MANUAL TAB ── */}
          {tab === 'manual' && (
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              {parseState==='done' && (
                <div style={{background:'var(--accent-bg)',border:'1px solid #B8DFC8',borderRadius:10,padding:'10px 14px',fontSize:13,color:'var(--accent2)',fontWeight:600}}>
                  ✅ {parseMsg}
                </div>
              )}
              <div className="grid-2">
                <div>
                  <label className="label">Nombre *</label>
                  <input className="input" value={form.name} onChange={e=>upd('name',e.target.value)} placeholder="Ej: Milanesas napolitanas" autoFocus />
                </div>
                <div>
                  <label className="label">Emoji</label>
                  <input className="input" value={form.emoji} onChange={e=>upd('emoji',e.target.value)} style={{fontSize:20,textAlign:'center'}} />
                </div>
              </div>
              <div className="grid-3">
                <div>
                  <label className="label">Categoría</label>
                  <select className="select" value={form.category} onChange={e=>upd('category',e.target.value)}>
                    {MEALS.map(m => <option key={m} value={m}>{MEAL_LABELS[m]}</option>)}
                  </select>
                </div>
                <div>
                  <label className="label">Tiempo (min)</label>
                  <input className="input" type="number" value={form.time} onChange={e=>upd('time',parseInt(e.target.value)||0)} />
                </div>
                <div>
                  <label className="label">Dificultad</label>
                  <select className="select" value={form.difficulty} onChange={e=>upd('difficulty',e.target.value)}>
                    <option value="fácil">Fácil</option>
                    <option value="media">Media</option>
                    <option value="elaborada">Elaborada</option>
                  </select>
                </div>
              </div>
              <div className="grid-2">
                <div>
                  <label className="label">Fuente / Origen</label>
                  <input className="input" value={form.source} onChange={e=>upd('source',e.target.value)} placeholder="Paulina Cocina, Instagram..." />
                </div>
                <div>
                  <label className="label">Tags (separados por coma)</label>
                  <input className="input" value={Array.isArray(form.tags)?form.tags.join(', '):form.tags} onChange={e=>upd('tags',e.target.value)} placeholder="rápido, horno, vegetariano" />
                </div>
              </div>
              <div>
                <div className="flex items-center justify-between mb-8">
                  <label className="label" style={{margin:0}}>Ingredientes <span style={{fontWeight:400,color:'var(--text3)'}}>(para 4 personas)</span></label>
                  <button className="btn btn-secondary btn-sm" onClick={addIng}>+ Agregar</button>
                </div>
                {form.ingredients.map((ing, i) => (
                  <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 80px 90px 32px',gap:6,marginBottom:6}}>
                    <input className="input" placeholder="Ingrediente" value={ing.name||''} onChange={e=>updIng(i,'name',e.target.value)} />
                    <input className="input" placeholder="Cant." value={ing.qty||''} onChange={e=>updIng(i,'qty',e.target.value)} />
                    <input className="input" placeholder="Unidad" value={ing.unit||''} onChange={e=>updIng(i,'unit',e.target.value)} />
                    <button className="btn btn-ghost btn-sm" onClick={()=>removeIng(i)} style={{padding:'5px 8px',color:'var(--rose)'}}>✕</button>
                  </div>
                ))}
              </div>
              <div>
                <div className="flex items-center justify-between mb-8">
                  <label className="label" style={{margin:0}}>Pasos de preparación</label>
                  <button className="btn btn-secondary btn-sm" onClick={addStep}>+ Agregar</button>
                </div>
                {form.steps.map((step, i) => (
                  <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 32px',gap:6,marginBottom:6}}>
                    <textarea className="textarea" style={{minHeight:52}} placeholder={`Paso ${i+1}...`} value={step||''} onChange={e=>updStep(i,e.target.value)} />
                    <button className="btn btn-ghost btn-sm" onClick={()=>removeStep(i)} style={{padding:'5px 8px',color:'var(--rose)',alignSelf:'start',marginTop:2}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          {tab==='pegar' ? (
            <button className="btn btn-primary" onClick={handleParse} disabled={!rawText.trim()}>✨ Procesar texto →</button>
          ) : (
            <button className="btn btn-primary" onClick={handleSave}>💾 Guardar Receta</button>
          )}
        </div>
      </div>
    </div>
  );
}

function DashboardPage({ week, recipes, inventory, setPage, setWeek }) {
  const [picker, setPicker] = useState(null);

  const totalMeals = Object.values(week).reduce((acc, day) => acc + Object.values(day).filter(Boolean).length, 0);
  const maxMeals = 7 * 5;
  const favCount = recipes.filter(r => r.favorite).length;
  const invCount = inventory.length;

  const autoGenWeek = () => {
    const newWeek = buildEmptyWeek();
    const shuffled = [...recipes].sort(() => Math.random() - 0.5);
    let idx = 0;
    DAYS.forEach(d => {
      MEALS.forEach(m => {
        const match = shuffled.find((r, i) => r.category === m && i >= idx);
        if (match) newWeek[d][m] = match;
        else {
          const any = shuffled.find(r => r.category === m);
          if (any) newWeek[d][m] = any;
        }
      });
    });
    setWeek(newWeek);
  };

  const today = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];

  return (
    <>
      {picker && <RecipePickerModal recipes={recipes} currentMeal={picker.meal}
        onSelect={r => { const w = {...week}; if(!w[picker.day]) w[picker.day]={}; w[picker.day][picker.meal]=r; setWeek(w); }}
        onClose={() => setPicker(null)} />}
      <div className="page-header">
        <div>
          <h2>Panel semanal</h2>
          <p>Semana del {new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</p>
        </div>
        <div className="flex gap-8">
          <button className="btn btn-secondary" onClick={autoGenWeek}>✨ Autogenerar semana</button>
          <button className="btn btn-primary" onClick={() => setPage('plan')}>Ver plan completo</button>
        </div>
      </div>
      <div className="page-body">
        <div className="grid-4 mb-16" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
          {[
            {num:totalMeals, label:`de ${maxMeals} comidas planificadas`, icon:'📅'},
            {num:recipes.length, label:'recetas en tu biblioteca', icon:'📚'},
            {num:favCount, label:'recetas favoritas', icon:'❤️'},
            {num:invCount, label:'items en inventario', icon:'🧊'},
          ].map((s,i) => (
            <div key={i} className="stat-card">
              <div style={{fontSize:22,marginBottom:4}}>{s.icon}</div>
              <div className="stat-num">{s.num}</div>
              <div className="stat-label">{s.label}</div>
              {i===0 && <div className="progress-bar mt-8"><div className="progress-fill" style={{width:`${Math.round(totalMeals/maxMeals*100)}%`}}></div></div>}
            </div>
          ))}
        </div>

        <div className="grid-2">
          <div>
            <h3 className="font-semibold mb-12" style={{fontSize:15}}>📅 Hoy — {DAY_FULL[DAYS.indexOf(today)]}</h3>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {MEALS.map(meal => {
                const recipe = week[today]?.[meal];
                return (
                  <div key={meal} className="card card-sm flex items-center gap-12" style={{cursor:'pointer'}}
                    onClick={() => setPicker({day:today, meal})}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:MEAL_COLORS[meal],flexShrink:0}}></div>
                    <span style={{fontSize:12,fontWeight:600,color:'var(--text3)',minWidth:70}}>{MEAL_LABELS[meal]}</span>
                    {recipe ? (
                      <div className="flex items-center gap-8 flex-1">
                        <span>{recipe.emoji}</span>
                        <span style={{fontSize:13,fontWeight:500}}>{recipe.name}</span>
                      </div>
                    ) : (
                      <span style={{fontSize:13,color:'var(--text3)',fontStyle:'italic'}}>Sin planificar · click para agregar</span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          <div>
            <h3 className="font-semibold mb-12" style={{fontSize:15}}>📋 Agregar receta desde texto</h3>
            <div className="card" style={{background:'var(--accent-bg)',border:'1px solid #B8DFC8',cursor:'pointer'}} onClick={()=>setPage('recipes')}>
              <div style={{display:'flex',alignItems:'center',gap:14,padding:'4px 0'}}>
                <span style={{fontSize:36}}>📋</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:'var(--accent2)',marginBottom:4}}>Importar receta con texto</div>
                  <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.5}}>
                    Copiá el texto de cualquier receta — de una web, Instagram, un libro — pegalo y la app lo convierte automáticamente. Sin fotos, sin API, sin configuración.
                  </div>
                  <div style={{marginTop:8,fontSize:12,color:'var(--accent)',fontWeight:600}}>Ir a Recetas → 📋 Importar / + Nueva →</div>
                </div>
              </div>
            </div>

            <h3 className="font-semibold mb-12 mt-16" style={{fontSize:15}}>❤️ Favoritas</h3>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {recipes.filter(r=>r.favorite).slice(0,4).map(r => (
                <div key={r.id} className="card card-sm flex items-center gap-10" style={{cursor:'pointer'}}
                  onClick={() => setPage('recipes')}>
                  <span style={{fontSize:20}}>{r.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{r.name}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>⏱ {r.time} min</div>
                  </div>
                  <span className={`badge ${CAT_COLORS[r.category]||'badge-gray'}`}>{MEAL_LABELS[r.category]}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function PlanPage({ week, setWeek, recipes }) {
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [picker, setPicker] = useState(null);

  const clearMeal = (day, meal) => {
    const w = {...week, [day]:{...week[day],[meal]:null}};
    setWeek(w);
  };

  const autoGen = () => {
    const newWeek = buildEmptyWeek();
    DAYS.forEach(d => {
      MEALS.forEach(m => {
        const pool = recipes.filter(r => r.category === m);
        newWeek[d][m] = pool.length ? pool[Math.floor(Math.random()*pool.length)] : null;
      });
    });
    setWeek(newWeek);
  };

  return (
    <>
      {selectedRecipe && <RecipeModal recipe={selectedRecipe} onClose={() => setSelectedRecipe(null)} />}
      {picker && <RecipePickerModal recipes={recipes} currentMeal={picker.meal}
        onSelect={r => { const w = {...week}; w[picker.day][picker.meal] = r; setWeek(w); }}
        onClose={() => setPicker(null)} />}

function RecipesPage({ recipes, setRecipes }) {
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("all");
  const [diffFilter, setDiffFilter] = useState("all");
  const [showFav, setShowFav] = useState(false);
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);


  const filtered = recipes.filter(r => {
    const ms = r.name.toLowerCase().includes(search.toLowerCase()) || r.tags?.some(t=>t.includes(search.toLowerCase()));
    const mc = catFilter === "all" || r.category === catFilter;
    const md = diffFilter === "all" || r.difficulty === diffFilter;
    const mf = !showFav || r.favorite;
    return ms && mc && md && mf;
  });

  const toggleFav = (id) => setRecipes(rs => rs.map(r => r.id === id ? {...r, favorite: !r.favorite} : r));
  const deleteRecipe = (id) => { if(window.confirm("¿Eliminar esta receta?")) setRecipes(rs => rs.filter(r => r.id !== id)); };
  const addRecipe = (r) => setRecipes(rs => [...rs, r]);

  return (
    <>
      {selected && <RecipeModal recipe={selected} onClose={() => setSelected(null)} />}
      {showAdd && <AddRecipeModal onClose={() => setShowAdd(false)} onSave={addRecipe} />}

      <div className="page-header">
        <div>
          <h2>Mis Recetas</h2>
          <p>{recipes.length} recetas en tu biblioteca</p>
        </div>
        <button className="btn btn-primary" onClick={() => setShowAdd(true)}>📋 Importar / + Nueva receta</button>
      </div>
      <div className="page-body">
        <div className="flex gap-8 mb-16 wrap">
          <input className="input" style={{maxWidth:280}} placeholder="🔍 Buscar receta..." value={search} onChange={e=>setSearch(e.target.value)} />
          <div className="tabs">
            {["all",...MEALS].map(c => (
              <button key={c} className={`tab ${catFilter===c?'active':''}`} onClick={()=>setCatFilter(c)}>
                {c==="all"?"Todas":MEAL_LABELS[c]}
              </button>
            ))}
          </div>
          <button className={`btn ${showFav?'btn-primary':'btn-secondary'} btn-sm`} onClick={()=>setShowFav(!showFav)}>
            ❤️ Favoritas
          </button>
          <select className="select" style={{width:'auto',paddingRight:8}} value={diffFilter} onChange={e=>setDiffFilter(e.target.value)}>
            <option value="all">Todas las dificultades</option>
            <option value="fácil">Fácil</option>
            <option value="media">Media</option>
            <option value="elaborada">Elaborada</option>
          </select>
        </div>

        <div className="recipe-grid">
          {filtered.map(r => (
            <div key={r.id} className="recipe-card">
              <div className="recipe-card-img" style={{background:`linear-gradient(135deg, ${MEAL_COLORS[r.category]}22, ${MEAL_COLORS[r.category]}44)`}}>
                <span>{r.emoji}</span>
              </div>
              <div className="recipe-card-body">
                <div className="recipe-card-title">{r.name}</div>
                <div className="recipe-card-meta">
                  <span className={`badge ${CAT_COLORS[r.category]||'badge-gray'}`}>{MEAL_LABELS[r.category]}</span>
                  <span className={`badge ${getDiffColor(r.difficulty)}`}>{r.difficulty}</span>
                  <span className="badge badge-gray">⏱ {r.time}m</span>
                </div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>📖 {r.source}</div>
                <div className="recipe-card-actions">

                  <button className="btn btn-secondary btn-sm" onClick={() => toggleFav(r.id)}>
                    {r.favorite ? '❤️' : '🤍'}

function InventoryPage({ inventory, setInventory }) {

  const addItem = () => {
    if (!newItem.name.trim()) return;
    setInventory(inv => [...inv, { ...newItem, id: Date.now() }]);
    setNewItem({ name:'', qty:'', unit:'unidades', emoji:'🥦', cat:'Verdulería' });
  };

  const removeItem = (id) => setInventory(inv => inv.filter(i => i.id !== id));
  const updateQty = (id, qty) => setInventory(inv => inv.map(i => i.id === id ? {...i, qty} : i));

  const filtered = catFilter === "all" ? inventory : inventory.filter(i => i.cat === catFilter);

  filtered.forEach(i => { if(!bycat[i.cat]) bycat[i.cat]=[]; bycat[i.cat].push(i); });

              <span className="sec-icon">{SHOPPING_CATS[cat] || '🛒'}</span>

              <span className="badge badge-gray" style={{marginLeft:'auto'}}>{items.length} items</span>

            <div className="inventory-grid">
              {items.map(item => (
                <div key={item.id} className="inventory-item">

                  <div style={{flex:1,minWidth:0}}>

// ─── PERSISTENCE ──────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('dashboard');
  const [recipes, setRecipes] = useState(() => load('fm_recipes', INITIAL_RECIPES));
  const [week, setWeek] = useState(() => load('fm_week', INITIAL_WEEK));
  const [inventory, setInventory] = useState(() => load('fm_inventory', INITIAL_INVENTORY));
  const [prefs, setPrefs] = useState(() => load('fm_prefs', { familyName:'Familia García', people:4, timeLevel:'medio', restrictions:[], proteinPriority:true, vegFriendly:true, mealPrep:false, quickBreakfast:true }));

  useEffect(() => { save('fm_recipes', recipes); }, [recipes]);
  useEffect(() => { save('fm_week', week); }, [week]);
  useEffect(() => { save('fm_inventory', inventory); }, [inventory]);
  useEffect(() => { save('fm_prefs', prefs); }, [prefs]);

  const navItems = [
    { id:'dashboard', icon:'🏠', label:'Panel' },
    { id:'plan', icon:'📅', label:'Planificador' },
    { id:'recipes', icon:'📚', label:'Recetas' },
    { id:'inventory', icon:'🧊', label:'Inventario' },
    { id:'shopping', icon:'🛒', label:'Compras' },
    { id:'prefs', icon:'⚙️', label:'Preferencias' },
  ];

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <DashboardPage week={week} recipes={recipes} inventory={inventory} setPage={setPage} setWeek={setWeek} />;
      case 'plan': return <PlanPage week={week} setWeek={setWeek} recipes={recipes} />;
      case 'recipes': return <RecipesPage recipes={recipes} setRecipes={setRecipes} />;
      case 'inventory': return <InventoryPage inventory={inventory} setInventory={setInventory} />;
      case 'shopping': return <ShoppingPage week={week} inventory={inventory} recipes={recipes} />;
      case 'prefs': return <PrefsPage prefs={prefs} setPrefs={setPrefs} />;
      default: return null;
    }
  };

  // ── PWA install prompt ───────────────────────────────────────────────
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstall, setShowInstall] = useState(false);
  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setInstallPrompt(e); setShowInstall(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);
  const handleInstall = async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    const { outcome } = await installPrompt.userChoice;
    if (outcome === 'accepted') setShowInstall(false);
  };

  const NAV_MAIN = navItems.slice(0, 5); // show first 5 in bottom nav

  return (
    <div className="app-shell">
      {/* ── Desktop/tablet sidebar ── */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <h1>🍽️ FamilyMeal</h1>
          <p>Planificador familiar</p>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">Principal</div>
          {navItems.slice(0,2).map(n => (
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={() => setPage(n.id)}>
              <span className="icon">{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
          <div className="nav-section" style={{marginTop:8}}>Gestión</div>
          {navItems.slice(2).map(n => (
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={() => setPage(n.id)}>
              <span className="icon">{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="family-badge">
            <div className="name">👨‍👩‍👧‍👦 {prefs.familyName}</div>
            <div className="sub">{prefs.people} personas · {prefs.timeLevel}</div>
          </div>
          <button className="btn btn-ghost" style={{width:'100%',marginTop:6,fontSize:11,color:'var(--accent2)',padding:'4px',fontWeight:600}}
            onClick={() => setPage('recipes')}>
            📋 Importar receta con texto
          </button>
          <button className="btn btn-ghost" style={{width:'100%',marginTop:2,fontSize:11,color:'var(--text3)',padding:'4px'}}
            onClick={() => { if(window.confirm('¿Resetear todos los datos al estado inicial?')) { ['fm_recipes','fm_week','fm_inventory','fm_prefs'].forEach(k=>localStorage.removeItem(k)); window.location.reload(); } }}>
            ↺ Resetear datos
          </button>
          {showInstall && (
            <button className="btn btn-primary" style={{width:'100%',marginTop:6,fontSize:11,padding:'6px'}}
              onClick={handleInstall}>
              📲 Instalar app
            </button>
          )}
        </div>
      </aside>

      <main className="main-content">
        {/* ── PWA install banner (mobile) ── */}
        {showInstall && (
          <div style={{background:'var(--accent)',color:'white',padding:'10px 16px',display:'flex',alignItems:'center',gap:10,fontSize:13}}>
            <span style={{fontSize:20}}>📲</span>
            <span style={{flex:1,fontWeight:500}}>Instalá FamilyMeal en tu pantalla de inicio</span>
            <button onClick={handleInstall} style={{background:'white',color:'var(--accent2)',border:'none',borderRadius:8,padding:'5px 12px',fontWeight:700,fontSize:12,cursor:'pointer'}}>Instalar</button>
            <button onClick={()=>setShowInstall(false)} style={{background:'none',border:'none',color:'white',fontSize:18,cursor:'pointer',padding:'0 4px'}}>✕</button>
          </div>
        )}
        {renderPage()}
      </main>

      {/* ── Mobile bottom navigation bar ── */}
      <nav className="bottom-nav">
        {NAV_MAIN.map(n => (
          <button key={n.id} className={`bottom-nav-item ${page===n.id?'active':''}`} onClick={() => setPage(n.id)}>
            <span className="bn-icon">{n.icon}</span>
            <span className="bn-label">{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
